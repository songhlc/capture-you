capture-me:
  # 数据目录
  data_dir: ~/.capture-me
  memory_dir: memory  # 兼容现有 memory/ 结构

  # Apple Reminders 设置
  reminders:
    list_name: Inbox
    default_time: "09:00"
    enabled: true

  # AI 处理设置
  ai:
    enabled: true
    model: claude-sonnet-4-20250514
    summarization: true
    entity_extraction: true
    intent_detection: true

  # 存储设置
  storage:
    markdown: true
    sqlite: true
    sqlite_path: ~/.capture-me/sqlite/capture.db
    notes_dir: ~/.capture-me/notes

  # 性格分析设置
  personality:
    enabled: true
    update_interval: daily  # daily | weekly
    emotion_keywords:
      positive: ["开心", "顺利", "完成", "成功", "高兴", "兴奋", "满意", "不错", "好", "棒", "突破", "进展"]
      negative: ["焦虑", "压力", "担忧", "烦恼", "郁闷", "沮丧", "失落", "失望", "难", "累", "疲惫", "没睡好"]
      neutral: ["正常", "一般", "平淡", "还好"]

  # 分类体系
  categories:
    - work
    - life
    - health
    - idea
    - todo
    - goal
    - investment

  # 定期任务 cron 表达式
  schedules:
    weekly_review: "0 9 * * 0"      # 每周日早 9 点
    monthly_review: "0 18 28-31 * *"  # 每月最后几天晚 6 点
    todo_check: "0 21 * * *"         # 每日晚 9 点
    personality_update: "0 22 * * *" # 每日晚 10 点
